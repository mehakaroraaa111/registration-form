<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student registration form </title>
</head>
<body>
         <h1>Student registration form</h1>

    <main>

<label>Roll no:</label>
<input type="text"><br><br>
<label>Student name:</label>
<input type="text"><br><br>
<label>Father name:</label>
<input type="text"><br><br>
<label>Date of birth: </label>
<input type="date"><br><br>
<layout>Email id:</layout>
<input type="Email"><br><br>
<label>Gender:</label>
<label for="Male">Male</label>
<input type="radio" id="Male" name="Gender" value="Male">
<label for="Female">Female</label>
<input type="radio" id="Female" name="Gender" value="Female">
<label for="Others">Others</label>
<input type="radio" id="Others" name="Gender" value="Others"><br><br>
<label>Departments:</label>
<label for="CSE">CSE</label>
<input type="Checkbox" id="CSE" name="department" value="CSE">
<label for="IT">IT</label>
<input type="Checkbox" id="IT" name="department" value="IT">
<label for="ECE">ECE</label>
<input type="Checkbox" id="ECE" name="department" value="ECE">
<label for="Civil">Civil</label>
<input type="Checkbox" id="Civil" name="department" value="Civil"><BR><BR>
<label for="Course">Select a current course: </label>   
<select id="course" name="course">
    <option value="select from the given courses">select from given courses</option>
<option value="Bachelors in computer science">Bachelors in computer science</option>
<option value="Btech in Electrical enginerring ">Btech in Electrical enginerring</option>
<option value="Bachelors in computer application">Bachelors in Computer applications</option>

</select><br><br>

<input type="text">

<input type="text"><br><br>
<textarea>
For any query,write here...
</textarea><br><br>

</footer>
